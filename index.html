<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevVault — Reddit-style</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="auth-screen">
  <div class="auth-box glass">
    <div class="auth-header">
      <div class="logo">🌀 DevVault</div>
      <p class="subtitle">анонимное сообщество</p>
    </div>
    <div class="tabs">
      <button class="tab active" data-form="login">Вход</button>
      <button class="tab" data-form="register">Регистрация</button>
    </div>
    <form id="form-login">
      <div class="field">
        <label>Никнейм</label>
        <input type="text" id="login-user" placeholder="username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary">Войти</button>
      <p id="login-error" class="error-msg"></p>
    </form>
    <form id="form-register" style="display:none">
      <div class="field">
        <label>Никнейм</label>
        <input type="text" id="reg-user" placeholder="username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="reg-pass" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div class="field">
        <label>Подтверждение</label>
        <input type="password" id="reg-confirm" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary">Создать аккаунт</button>
      <p id="reg-error" class="error-msg"></p>
    </form>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="header-inner">
      <div class="logo" id="logo-link">🌀 DevVault</div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Поиск постов и сообществ...">
      </div>
      <nav class="header-nav">
        <button class="nav-btn" data-view="feed">📰 Лента</button>
        <button class="nav-btn" data-view="communities">🌐 Сообщества</button>
        <button class="nav-btn" data-view="create">✏️ Создать</button>
        <button class="nav-btn" id="btn-profile">👤 <span id="user-badge"></span></button>
        <button class="nav-btn" id="btn-logout">🚪</button>
      </nav>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3>🏠 Главная</h3>
        <div class="sidebar-link" data-view="feed">📰 Лента</div>
        <div class="sidebar-link" data-view="communities">🌐 Сообщества</div>
      </div>
      <div class="sidebar-section">
        <h3>➕ Создать</h3>
        <div class="sidebar-link" data-view="create">✏️ Новый пост</div>
        <div class="sidebar-link" data-view="create-community">🆕 Сообщество</div>
      </div>
      <div class="sidebar-section" id="sidebar-communities">
        <h3>📌 Мои сообщества</h3>
      </div>
    </aside>

    <div class="content" id="content"></div>
  </main>
</div>

<script src="server.js"></script>
<script src="client.js"></script>
<script src="script.js"></script>
</body>
</html>
